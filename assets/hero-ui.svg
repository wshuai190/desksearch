<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="0" y="0" width="900" height="520" rx="10"/>
    </clipPath>
  </defs>

  <!-- Window frame -->
  <g filter="url(#shadow)" clip-path="url(#windowClip)">
    <!-- Title bar -->
    <rect x="0" y="0" width="900" height="38" fill="#1a1a2e"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="19" r="6" fill="#febc2e"/>
    <circle cx="60" cy="19" r="6" fill="#28c840"/>
    <!-- Tab -->
    <rect x="80" y="6" width="120" height="26" rx="6" fill="#2a2a40"/>
    <text x="140" y="23" font-family="system-ui,sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">DeskSearch</text>
    <!-- URL bar -->
    <rect x="220" y="8" width="460" height="22" rx="6" fill="#0f0f1a"/>
    <text x="450" y="23" font-family="ui-monospace,monospace" font-size="11" fill="#71717a" text-anchor="middle">127.0.0.1:3777</text>

    <!-- Main content area -->
    <rect x="0" y="38" width="900" height="452" fill="#0f0f1a"/>

